# ============================================================
# Exercise 1: Primary DataSource Configuration (H2)
# ============================================================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# Logging
# ============================================================
logging.level.com.example.employeemanagement=debug
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.type.descriptor.sql=trace

# ============================================================
# Exercise 10: Hibernate Batch Processing
# ============================================================
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# ============================================================
# Secondary DataSource (Exercise 9)
# ============================================================
app.secondary.datasource.url=jdbc:h2:mem:testdb_audit
app.secondary.datasource.driver-class-name=org.h2.Driver
app.secondary.datasource.username=sa
app.secondary.datasource.password=password
